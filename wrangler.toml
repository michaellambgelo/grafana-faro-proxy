name = "grafana-faro-proxy"
main = "worker.js"
compatibility_date = "2025-09-15"

[dev]
port = 8787

# Production defaults (applied on `wrangler deploy` without --env).
# These were previously in [env.production.vars] but were never actually
# picked up by the CI deploy, which did not pass --env production. Moving
# them to top-level [vars] makes the config effective on the existing worker.
[vars]
GRAFANA_COLLECTOR_HOST = "faro-collector-prod-us-east-0.grafana.net"
ALLOWED_ORIGINS = "https://michaellamb.dev,https://blog.michaellamb.dev,https://letterboxd.michaellamb.dev,https://michaellambgelo.github.io,https://boxd-card.com,https://boxd-card.michaellamb.dev"

# Local dev overrides (used by `wrangler dev --env development`).
[env.development.vars]
GRAFANA_COLLECTOR_HOST = "faro-collector-prod-us-east-0.grafana.net"
ALLOWED_ORIGINS = "http://localhost:4000,http://localhost:5173"

# Routes configuration
[[routes]]
pattern = "grafana.michaellamb.dev"
zone_name = "michaellamb.dev"
custom_domain = true

# Required secrets (set via `wrangler secret put <NAME>`):
#
# Per-app ingest tokens — Grafana Cloud, used to forward telemetry upstream:
# - BLOG_INGEST_TOKEN
# - LETTERBOXD_INGEST_TOKEN
# - LANDING_INGEST_TOKEN
# - EMBED_BUILDER_INGEST_TOKEN — discord-embed-builder browser RUM
# - EMBED_BUILDER_SLASH_INGEST_TOKEN — discord-embed-builder slash-command
#   server-to-server telemetry
# - BOXD_CARD_INGEST_TOKEN — boxd-card hero + web app browser RUM
#
# Server-to-server bypass:
# - SERVER_SHARED_SECRET — shared secret matched against the X-Server-Token
#   header to bypass the Origin allowlist and bot-UA gate. Required for any
#   server-to-server caller (no browser sends X-Server-Token, so this does
#   not affect existing Faro RUM traffic).

# Analytics Engine binding for per-request metrics (app, latency, outcome).
# The dataset is auto-created on first write; free plan includes 100k writes/day.
# The worker checks for the binding at runtime and no-ops if unavailable, so
# commenting this block out is a safe way to disable metric emission.
[[analytics_engine_datasets]]
binding = "FARO_PROXY_METRICS"
dataset = "faro_proxy_metrics"
